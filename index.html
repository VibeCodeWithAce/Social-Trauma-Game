<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Social Trauma Fight</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <!-- Touch Controls (fight screen) -->
    <div id="touch-controls">
        <button id="touch-left" class="touch-btn touch-dir" data-dir="left">&#9664;</button>
        <button id="touch-right" class="touch-btn touch-dir" data-dir="right">&#9654;</button>
        <button id="touch-fire" class="touch-btn touch-action" data-action="shoot">FIRE</button>
    </div>

    <!-- Touch tap zone for menus (title, select, victory) -->
    <div id="touch-menu"></div>

    <script src="src/state.js"></script>
    <script src="src/input.js"></script>
    <script src="src/fighters.js"></script>
    <script src="src/sound.js"></script>
    <script src="src/render.js"></script>
    <script src="src/game.js"></script>
    <script src="src/main.js"></script>
</body>
</html>
