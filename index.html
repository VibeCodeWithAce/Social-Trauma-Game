<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Social Trauma Fight</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="orientation-warning">
        <p>Please rotate your device to landscape mode</p>
    </div>
    <canvas id="gameCanvas"></canvas>

    <!-- Touch Controls -->
    <div id="touch-controls">
        <div id="dpad">
            <button class="dpad-btn" data-dir="left">&#9664;</button>
            <button class="dpad-btn" data-dir="right">&#9654;</button>
        </div>
        <div id="action-buttons">
            <button class="action-btn" data-action="shoot">FIRE</button>
        </div>
    </div>

    <script src="src/state.js"></script>
    <script src="src/input.js"></script>
    <script src="src/fighters.js"></script>
    <script src="src/sound.js"></script>
    <script src="src/render.js"></script>
    <script src="src/game.js"></script>
    <script src="src/main.js"></script>
</body>
</html>
